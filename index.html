<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
      }
      #header {
        background: #c2f8ff;
        width: 100vw;
        height: 40px;
        line-height: 40px;
        text-align: center;
        font-size: 14pt;
      }
      #titlescreen {
        position: relative;
        top: 25vh;
        font-size: 40pt;
        text-align: center;
        width: 100vw;
      }
      #mission {
        background: #ffffff;
        position: relative;
        width: 60vw;
        left: 20vw;
        top: 33vh;
        border: 3px solid #33bbff;
        text-align: center;
        font-size: 20pt;
      }
      #note {
        position: relative;
        top: 48vh;
        font-size: 10pt;
        text-align: center;
        width: 100vw;
      }
      #forgot {
        position: relative;
        top: 48vh;
        font-size: 10pt;
        text-align: center;
        width: 100vw;
      }
    </style>
  </head>
  <body>
    <div id="header">
      inspired by, but not associated with, FREAKBAiT
    </div>
    <div id="titlescreen">TOMORROW'S MISSION</div>
    <div id="mission"></div>
    <div id="note">updates every day at 8pm <br> refresh the page <br><br></div>
    <div id="forgot"></div>
    <script>
      const lastEdited = new Date("2026-05-24");
      //will stop working after 2 june
      const missions = [
        `see how many times you can invent an entirely new word and floopy it into conversation before someone says something`,
        `walk up to a stranger in school, say "it's good to see you again!", then insist that you've met them several times before`,
        `with any friend that you don't have plans with, but who normally sees messages quickly, text "ETA?" and then turn your phone off`,
        `when introducing two of your friends, mention something normal about one of them to ther other, but act like it's really weird`,
        `walk up to a stranger in school and ask them "can i ask you a question?", then when they say yes, say "thank you" and walk away`,
        `while talking to or texting a friend, randomly say "calm down" and then refuse to elaborate afterwards`,
        `at the end of the day, text a friend saying "sorry i couldn't join you guys today, hope you had fun" even though you didn't have plans`,
        `give someone a really specific compliment, then in earshot, give someone else the exact same compliment`,
        `take a picture of your friend's phone, then after they leave, send them that picture and tell them they forgot their phone`,
        `write a list of all of your friends' names on a piece of paper, cross some of them out, then drop it near a friend as if by accident`
      ];
      
      const date = new Date();
      const morningsSinceIncident = Math.floor(Math.abs(date - lastEdited) / 86400000);
      lastEdited.setHours(20);
      const msSinceIncident = Math.abs(date - lastEdited);
      const daysSinceIncident = Math.floor(msSinceIncident / 86400000);
      const msAfterEight = msSinceIncident - 86400000 * daysSinceIncident;

      if (msAfterEight < 14400000) {
        document.getElementById("mission").innerHTML = missions[daysSinceIncident];
      } else {
        document.getElementById("mission").innerHTML = "no spoilers! come back tonight for tomorrow's";
        document.getElementById("mission").style.color = "#808080"
      }

      if (morningsSinceIncident > 0) {
        document.getElementById("forgot").innerHTML = "in case you forgot today's mission:<br>" + missions[morningsSinceIncident - 1];
      }
    </script>
  </body>
</html>
