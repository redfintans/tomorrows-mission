<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
      }
      #header {
        background: #c2f8ff;
        width: 100vw;
        height: 40px;
        line-height: 40px;
        text-align: center;
        font-size: 14pt;
      }
      #titlescreen {
        position: relative;
        top: 25vh;
        font-size: 40pt;
        text-align: center;
        width: 100vw;
      }
      #mission {
        background: #ffffff;
        position: relative;
        width: 60vw;
        left: 20vw;
        top: 33vh;
        border: 3px solid #33bbff;
        text-align: center;
        font-size: 20pt;
      }
      #note {
        position: relative;
        top: 48vh;
        font-size: 10pt;
        text-align: center;
        width: 100vw;
      }
      #complete {
        position: relative;
        top: 55vh;
        left: 70vw;
        font-size: 10pt;
        text-align: center;
        width: 20vw;
        visibility: hidden;
      }
      #click {
        position: relative;
        border: outset 3px #a0a0a0;
        top: 38vh;
        left: 70vw;
        font-size: 12pt;
        text-align: center;
        width: 20vw;
        line-height: 10vh;
      }
    </style>
  </head>
  <body>
    <div id="header">inspired by, but not associated with, FREAKBAiT</div>
    <div id="titlescreen">TOMORROW'S MISSION</div>
    <div id="mission"></div>
    <div id="note">updates every day at 8pm <br> refresh the page <br><br></div>
    <div id="complete">good work! mission completion stored as a cookie</div>
    <button id="click" onclick="checkMission()">i completed today's mission!</button>
    <script>

      function checkMission() {
        missionComplete(missions[daysSinceIncident], 365);
        document.getElementById("click").style.visibility = "hidden";
        document.getElementById("complete").style.visibility = "visible";
        setTimeout(hide, 3000);
      }

      function formatDate(date) {
        if (date.getMonth() + 1 >= 9) {
          return date.getFullYear().toString() + "-" + (date.getMonth() + 1).toString() + "-" + date.getDate().toString();
        } else {
          return date.getFullYear().toString() + "-0" + (date.getMonth() + 1).toString() + "-" + date.getDate().toString();
        }
      }

      function hide() {
        document.getElementById("complete").style.visibility = "hidden";
      }

      function missionComplete(text, exdays) {
        var d = new Date();
        d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
        let expires = "expires=" + d.toUTCString();
        let missionCookies = getCookie("missions");
        latestMissionCookies = missionCookies.toString() + formatDate(date) + "&" + text + "#";
        document.cookie = "missions=" + latestMissionCookies + ";" + expires + ";path=/;";
      }

      function getCookie(cname) {
        let name = cname + "=";
        let ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') {
            c = c.substring(1);
          }
          if (c.indexOf(name) == 0) {
              return c.substring(name.length, c.length);
          }
        }
        return "";
      }

      function nukeCookie(cname) {
        var d = new Date();
        d.setTime(d.getTime() - 1);
        let expires = "expires=" + d.toUTCString();
        document.cookie = cname + "=;" + expires + ";path=/;";
        return "";
      }

      const lastEdited = new Date("2026-05-24");
      //will stop working after 2 june
      const missions = [
        `see how many times you can invent an entirely new word and floopy it into conversation before someone says something`,
        `walk up to a stranger in school, say "it's good to see you again!", then insist that you've met them several times before`,
        `with any friend that you don't have plans with, but who normally sees messages quickly, text "ETA?" and then turn your phone off`,
        `when introducing two of your friends, mention something normal about one of them to ther other, but act like it's really weird`,
        `walk up to a stranger in school and ask them "can i ask you a question?", then when they say yes, say "thank you" and walk away`,
        `while talking to or texting a friend, randomly say "calm down" and then refuse to elaborate afterwards`,
        `at the end of the day, text a friend saying "sorry i couldn't join you guys today, hope you had fun" even though you didn't have plans`,
        `give someone a really specific compliment, then in earshot, give someone else the exact same compliment`,
        `take a picture of your friend's phone, then after they leave, send them that picture and tell them they forgot their phone`,
        `write a list of all of your friends' names on a piece of paper, cross some of them out, then drop it near a friend as if by accident`
      ];
      
      const date = new Date();
      lastEdited.setHours(20);
      const msSinceIncident = Math.abs(date - lastEdited);
      const daysSinceIncident = Math.floor(msSinceIncident / 86400000);
      const msAfterEight = msSinceIncident - 86400000 * daysSinceIncident;

      document.getElementById("mission").innerHTML = missions[daysSinceIncident];
      if (msAfterEight >= 14400000) {
        document.getElementById("titlescreen").innerHTML = "TODAY'S MISSION";
        let completedMissions = getCookie("missions").split("#");
        completedMissions.pop();
        for (let mission of completedMissions) {
          let missionDateParsed = mission.split("&")[0];
          let missionDate = new Date(missionDateParsed);
          if (missionDate.getFullYear() == date.getFullYear() & missionDate.getMonth() == date.getMonth() & missionDate.getDate() == date.getDate()) {
            document.getElementById("click").style.visibility = "hidden";
          }
        }
      } else {
        document.getElementByIddd("click").style.visibility = "hidden";
      }

      
    </script>
  </body>
</html>
