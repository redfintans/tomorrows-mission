    <script>
      // dummy

      function unleash() {
        for (let i = 0; i < 15; i++){
          let confet = "confet" + (i + 1).toString();
          document.getElementById(confet).style.left = (Math.random() * window.innerWidth / 100 * 30).toString() + "px";
          document.getElementById(confet).style.animationDelay = (Math.random() / 2).toString() + "s";
          document.getElementById(confet).style.animationIterationCount = "infinite";
          document.getElementById(confet).style.animationName = "confetti";
          document.getElementById(confet).style.visibility = "visible";
        }
        for (let i = 0; i < 15; i++){
          let confet = "confet" + (i + 16).toString();
          document.getElementById(confet).style.left = (window.innerWidth - (Math.random() * window.innerWidth / 100 * 30) - window.innerWidth / 100 * 3).toString() + "px";
          document.getElementById(confet).style.animationDelay = (Math.random() / 2).toString() + "s";
          document.getElementById(confet).style.animationIterationCount = "infinite";
          document.getElementById(confet).style.animationName = "confetti";
          document.getElementById(confet).style.visibility = "visible";
        }
        setTimeout(secondWind, 5000);
      }

      function secondWind() {
        for (let i = 0; i < 30; i++){
          let confet = "confet" + (i + 1).toString();
          document.getElementById(confet).style.animationIterationCount = "1";
          document.getElementById(confet).style.visibility = "hidden";
        }
      }

      function completeMission() {
        missionComplete(missions[daysSinceIncident]);
        document.getElementById("click").style.visibility = "hidden";
        document.getElementById("complete").style.visibility = "visible";
        completedMissions = getCookie("missions").split("#");
        completedMissions.pop();
        document.getElementById("count").innerHTML = "completed missions: " + completedMissions.length;
        checkStreakBeforeEight();
        setTimeout(hide, 3000);
        unleash();
      }

      function formatDate(date) {
        if (date.getMonth() + 1 >= 9) {
          return date.getFullYear().toString() + "-" + (date.getMonth() + 1).toString() + "-" + date.getDate().toString();
        } else {
          return date.getFullYear().toString() + "-0" + (date.getMonth() + 1).toString() + "-" + date.getDate().toString();
        }
      }

      function hide() {
        document.getElementById("complete").style.visibility = "hidden";
      }

      function missionComplete(text) {
        var d = new Date();
        d.setTime(d.getTime() + (400 * 24 * 60 * 60 * 1000)); // 400 days is the limit for cookie expiration
        let expires = "expires=" + d.toUTCString();
        let missionCookies = getCookie("missions");
        latestMissionCookies = missionCookies + formatDate(date) + "&" + text + "#";
        document.cookie = "missions=" + latestMissionCookies + ";" + expires + ";path=/;";
      }

      function checkStreakBeforeEight() {
        let lastItem = completedMissions[completedMissions.length - 1];
        if (lastItem == undefined) {
          document.getElementById("streak").innerHTML = "last mission: never<br>mission streak: 0";
        } else {
          let lastMission = new Date(lastItem.split("&")[0]);
          if (lastMission.getFullYear() == date.getFullYear() & lastMission.getMonth() == date.getMonth() & lastMission.getDate() == date.getDate()) {
            var streakNo = countStreak();
            var streakStart = completedMissions[completedMissions.length - streakNo].split("&")[0];
            document.getElementById("streak").innerHTML = "streak start: " + streakStart + "<br>mission streak: " + streakNo;
          } else {
            checkMission = new Date();
            checkMission.setTime(lastMission.getTime() + (24 * 60 * 60 * 1000));
            if (checkMission.getFullYear() == date.getFullYear() & checkMission.getMonth() == date.getMonth() & checkMission.getDate() == date.getDate()) {
              var streakNo = countStreak();
              var streakStart = completedMissions[completedMissions.length - streakNo].split("&")[0];
              document.getElementById("streak").innerHTML = "streak start: " + streakStart + "<br>mission streak: " + streakNo + "<br>streak at risk!";
            } else {
              document.getElementById("streak").innerHTML = "last mission: " + formatDate(lastMission) + "<br>mission streak: 0";
            }
          }
        }
      }

      function checkStreakAfterEight() {
        let lastItem = completedMissions[completedMissions.length - 1];
        if (lastItem == undefined) {
          document.getElementById("streak").innerHTML = "last mission: never<br>mission streak: 0";
        } else {
          let lastMission = new Date(lastItem.split("&")[0]);
          if (lastMission.getFullYear() == date.getFullYear() & lastMission.getMonth() == date.getMonth() & lastMission.getDate() == date.getDate()) {
            var streakNo = countStreak();
            var streakStart = completedMissions[completedMissions.length - streakNo].split("&")[0];
            document.getElementById("streak").innerHTML = "streak start: " + streakStart + "<br>mission streak: " + streakNo;
          } else {
            document.getElementById("streak").innerHTML = "last mission: " + formatDate(lastMission) + "<br>mission streak: 0";
          }
        }
      }

      function countStreak() {
        for (let i = 1; i <= completedMissions.length; i++) {
          var prevMission = completedMissions[completedMissions.length - i - 1];
          if (prevMission == undefined) {
            return completedMissions.length;
          } else {
            var missionDateParsed = prevMission.split("&")[0];
            let missionDatePrev = new Date(missionDateParsed);
            missionDateParsed = completedMissions[completedMissions.length - i].split("&")[0];
            let missionDateLast = new Date(missionDateParsed);
            missionDatePrev.setTime(missionDatePrev.getTime() + (24 * 60 * 60 * 1000));
            if (missionDatePrev.getFullYear() == missionDateLast.getFullYear() & missionDatePrev.getMonth() == missionDateLast.getMonth() & missionDatePrev.getDate() == missionDateLast.getDate()) {
              continue;
            } else {
              return i;
            }
          }
        }
      }
      
      function getCookie(cname) {
        let name = cname + "=";
        let ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') {
            c = c.substring(1);
          }
          if (c.indexOf(name) == 0) {
              return c.substring(name.length, c.length);
          }
        }
        return "";
      }

      const lastEdited = new Date("2026-05-24");
      //will stop working after 2 june
      const missions = [
        `see how many times you can invent an entirely new word and floopy it into conversation before someone says something`,
        `walk up to a stranger in school, say "it's good to see you again!", then insist that you've met them several times before`,
        `with any friend that you don't have plans with, but who normally sees messages quickly, text "ETA?" and then turn your phone off`,
        `introduce two of your friends to each other, and when you do, mention something normal about one of them to the other but act like it's really weird`,
        `walk up to a stranger in school and ask them "can i ask you a question?", then when they say yes, say "thank you" and walk away`,
        `while talking to or texting a friend, randomly say "calm down" and then refuse to elaborate afterwards`,
        `at the end of the day, text a friend saying "sorry i couldn't join you guys today, hope you all had fun" even though you didn't have plans`,
        `in mid-conversation, see how many accessories you can put on before someone says something`,
        `walk up to someone, tell them "this is the target", and then hand them an envelope containing pictures or drawings of shrek`,
        `when ordering from a store, insist that you want "the usual"`,
        `while talking to someone, see how many times you can swap an item between your pockets`,
        `while talking to someone and walking, slowly increase your pace until you're both running`,
        `ask someone for the time at least three separate times in the same day, either over text or while wearing a watch`,
        `see how many times you can use the word "insofar" in conversation before somebody says something`,
        `set a picture of your friend as your lock screen, then ask that friend to take a photo of you using your phone`
      ];
      
      const date = new Date();
      lastEdited.setHours(20);
      const msSinceIncident = Math.abs(date - lastEdited);
      const daysSinceIncident = Math.floor(msSinceIncident / 86400000);
      const msAfterEight = msSinceIncident - 86400000 * daysSinceIncident;

      var completedMissions = getCookie("missions").split("#");
      completedMissions.pop();

      document.getElementById("mission").innerHTML = missions[daysSinceIncident];
      document.getElementById("count").innerHTML = "completed missions: " + completedMissions.length;

      if (msAfterEight >= 14400000) {
        checkStreakBeforeEight();
        document.getElementById("titlescreen").innerHTML = "TODAY'S MISSION";
        for (let mission of completedMissions) {
          let missionDateParsed = mission.split("&")[0];
          let missionDate = new Date(missionDateParsed);
          if (missionDate.getFullYear() == date.getFullYear() & missionDate.getMonth() == date.getMonth() & missionDate.getDate() == date.getDate()) {
            document.getElementById("click").style.visibility = "hidden";
          }
        }
      } else {
        checkStreakAfterEight();
        document.getElementById("click").style.visibility = "hidden";
      }
